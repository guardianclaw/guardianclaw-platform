[project]
name = "claw-runtime"
version = "0.1.0"
description = "Serverless Python runtime for GuardianClaw Platform agent execution"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "GuardianClaw Team", email = "contact@guardianclaw.org" }
]
keywords = ["ai", "safety", "agents", "serverless", "modal"]

dependencies = [
    "modal>=0.73.82",  # Required for @modal.fastapi_endpoint
    "openai>=1.50.0",
    "anthropic>=0.37.0",
    "guardianclaw>=2.25.0",  # v2.25: Multi-turn support in public API (conversation_history)
    "pydantic>=2.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
    "mypy>=1.11.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
