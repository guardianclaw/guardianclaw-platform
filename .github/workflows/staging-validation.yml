name: Staging Validation

# Frente H — smoke + E2E reais contra staging.
#
# Triggered manually via workflow_dispatch once staging-api.guardianclaw.org
# resolves. Splits the validation into two jobs (smoke and e2e) so a single
# failing layer does not mask the other.
#
# Pre-requisitos antes de rodar:
#   - NS de guardianclaw.org migrados para Cloudflare (Frente I prerequisite)
#   - DNS records criados em CF para staging-api.guardianclaw.org e staging.guardianclaw.org
#   - Wrangler deploy --env staging executado (`claw-api` worker name + env)
#   - Vercel preview/staging deploy disponível em staging.guardianclaw.org
#
# Não roda em push/PR — só workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Staging API base URL'
        required: false
        default: 'https://staging-api.guardianclaw.org'
        type: string
      web_url:
        description: 'Staging Web base URL'
        required: false
        default: 'https://staging.guardianclaw.org'
        type: string
      skip_e2e:
        description: 'Skip E2E (smoke only)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: staging-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Pre-flight DNS check
    runs-on: ubuntu-latest
    steps:
      - name: Verify staging API resolves
        run: |
          set -e
          host="${{ github.event.inputs.api_url }}"
          host="${host#https://}"
          host="${host#http://}"
          host="${host%%/*}"
          echo "Resolving $host…"
          dig +short "$host"
          getent hosts "$host" || (echo "::error::$host does not resolve. Did NS migrate?" && exit 1)
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" "${{ github.event.inputs.api_url }}/health"

      - name: Verify staging Web resolves
        run: |
          set -e
          host="${{ github.event.inputs.web_url }}"
          host="${host#https://}"
          host="${host#http://}"
          host="${host%%/*}"
          echo "Resolving $host…"
          dig +short "$host"
          getent hosts "$host" || (echo "::error::$host does not resolve. Is the Vercel staging alias configured?" && exit 1)
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" "${{ github.event.inputs.web_url }}"

  smoke:
    name: Smoke (k6)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: Run smoke against staging
        run: k6 run apps/api/k6/smoke-test-ci.js
        env:
          API_BASE_URL: ${{ github.event.inputs.api_url }}
      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-staging-results
          path: smoke-test-ci-results.json
          retention-days: 14

  e2e:
    name: E2E (Playwright) against staging
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ inputs.skip_e2e != true }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run E2E against staging
        working-directory: apps/web
        # The default playwright.config.ts spawns `npm run dev`. For staging we
        # explicitly disable that by exporting PLAYWRIGHT_NO_WEBSERVER=1; the
        # config respects it when set (must be added to the config — tracked
        # alongside this workflow).
        run: npx playwright test
        env:
          CI: true
          E2E_BASE_URL: ${{ github.event.inputs.web_url }}
          E2E_API_URL: ${{ github.event.inputs.api_url }}
          PLAYWRIGHT_NO_WEBSERVER: '1'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-report
          path: apps/web/playwright-report/
          retention-days: 14
