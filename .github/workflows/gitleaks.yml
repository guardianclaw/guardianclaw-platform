name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly full-history re-scan to catch anything that slipped through
    # as the default rule set evolves upstream.
    - cron: '17 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so PR scans cover the whole diff range and
          # scheduled scans cover everything.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full history
        run: |
          # Exit 1 if any leak is detected that the .gitleaks.toml
          # allowlist does not cover. Output redacted so secrets do not
          # appear in workflow logs.
          gitleaks git \
            --config .gitleaks.toml \
            --log-opts="--all" \
            --redact \
            --no-banner \
            --exit-code 1
