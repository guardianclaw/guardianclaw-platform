name: Smoke Test

on:
  # Run after successful deployment
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
    branches: [main]

  # Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

  # Scheduled - run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  issues: write

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest

    # Only run if deployment succeeded (for workflow_run trigger)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Determine API URL
        id: api-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
              echo "url=https://staging-api.guardianclaw.org" >> $GITHUB_OUTPUT
            else
              echo "url=https://api.guardianclaw.org" >> $GITHUB_OUTPUT
            fi
          else
            # Default to production for scheduled and workflow_run
            echo "url=https://api.guardianclaw.org" >> $GITHUB_OUTPUT
          fi

      - name: Run Smoke Test
        run: k6 run apps/api/k6/smoke-test-ci.js
        env:
          API_BASE_URL: ${{ steps.api-url.outputs.url }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: smoke-test-ci-results.json
          retention-days: 7

      - name: Check Test Status
        if: failure()
        run: |
          echo "::error::Smoke test failed! Check the test results for details."
          exit 1

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()

    steps:
      - name: Create Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Smoke Test Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Smoke Test Failure

            The scheduled smoke test has failed.

            **Workflow Run:** [View Details](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})

            **Triggered by:** ${context.eventName}
            **Time:** ${new Date().toISOString()}

            Please investigate and resolve the issue.
            `;

            // Check if similar issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'smoke-test-failure',
              per_page: 1,
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['smoke-test-failure', 'bug', 'urgent'],
              });
            }
