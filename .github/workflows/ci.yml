name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:
    # Allow this workflow to be called by other workflows (e.g., deploy.yml)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint --workspace=@guardianclaw/api

      - name: Lint Web
        run: npm run lint --workspace=@guardianclaw/web

      - name: Lint Core
        run: npm run lint --workspace=@guardianclaw/core

      - name: Lint Shared
        run: npm run lint --workspace=@guardianclaw/shared

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:run --workspace=@guardianclaw/api

      - name: Run API tests with coverage
        run: npm run test:coverage --workspace=@guardianclaw/api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Web tests
        run: npx vitest run --config vitest.config.ci.ts
        working-directory: apps/web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-api, test-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build --workspace=@guardianclaw/shared --if-present

      - name: Build Web
        run: npm run build --workspace=@guardianclaw/web
        env:
          NEXT_PUBLIC_API_URL: https://api.guardianclaw.org
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next/
          retention-days: 1

  build-browser:
    name: Build Browser Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # @guardianclaw/browser is wired to @guardianclaw/core through the
      # workspace symlink; the tsconfig path mappings resolve to core
      # sources, so a core build is not strictly required for type
      # resolution, but we build it anyway to mirror the published
      # consumption shape and to surface any core-side regression at the
      # same gate.
      - name: Build Core
        run: npm run build --workspace=@guardianclaw/core

      - name: Build Browser Extension
        run: npm run build --workspace=@guardianclaw/browser

      - name: Verify extension artifacts
        run: |
          set -euo pipefail
          cd apps/browser/dist
          for f in popup.js content.js background.js popup.html manifest.json content.css; do
            test -f "$f" || { echo "missing extension artifact: $f" >&2; exit 1; }
          done

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: apps/browser/dist/
          retention-days: 1

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck API
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: TypeCheck Web
        run: npx tsc --noEmit --project apps/web/tsconfig.json

  pattern-sync:
    name: Pattern Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify patterns/*.json are in sync with generated sources
        run: python scripts/gen_patterns.py --check

      - name: Verify Python re and JS RegExp produce identical verdicts
        run: python scripts/check_pattern_parity.py

  corpus-validation:
    name: Corpus Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SDK
        run: pip install -e ./sdk

      - name: Run corpus harness against current SDK
        run: python evaluation/corpus/run.py

  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sdk/pyproject.toml

      - name: Install SDK with dev extras
        run: pip install -e "./sdk[dev]" requests

      - name: Run pytest
        run: pytest --tb=short
        working-directory: sdk
