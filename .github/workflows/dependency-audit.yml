name: Dependency Audit

# CVE scanning for npm dependencies. Audit ref: 2026-04-23 plan P2.1.
#
# We use `npm audit` rather than actions/dependency-review-action@v4 because
# the latter requires GitHub Advanced Security, which is not available on
# User Free private repos (see SECURITY.md G-06 for the broader plan-tier
# story). When the repo migrates to an Org with GHAS or is made public, this
# workflow can be replaced with the GitHub-native dependency-review action
# for richer PR-time diffs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — same convention as gitleaks, off-peak.
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Snapshot the current production-tree audit. The hard gate below reads
      # this file rather than re-running npm audit so the gate sees the exact
      # same advisories the human operator does in the run logs.
      - name: Capture npm audit (production tree)
        id: audit
        run: |
          set +e
          npm audit --omit=dev --json > audit-prod.json
          npm audit --omit=dev || true
          set -e

      # Hard gate: any production high/critical GHSA not present in
      # .github/audit-allowlist.json fails the workflow. Stale allowlist
      # entries (advisory no longer in tree) emit a warning but do not fail
      # — the audit output is the source of truth.
      - name: Audit gate (allowlist enforcement)
        run: node scripts/audit-gate.mjs audit-prod.json

      # Informational sweep across the whole tree (devDeps included). Never
      # fails the job; output is preserved in workflow logs for triage.
      - name: Audit all dependencies (informational, never fails)
        if: always()
        run: npm audit || true
