name: Dependency Audit

# CVE scanning for npm dependencies. Audit ref: 2026-04-23 plan P2.1.
#
# We use `npm audit` rather than actions/dependency-review-action@v4 because
# the latter requires GitHub Advanced Security, which is not available on
# User Free private repos (see SECURITY.md G-06 for the broader plan-tier
# story). When the repo migrates to an Org with GHAS or is made public, this
# workflow can be replaced with the GitHub-native dependency-review action
# for richer PR-time diffs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — same convention as gitleaks, off-peak.
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Production sweep — high/critical visible in the run header. Initially
      # soft-fail because the existing lockfile carries a backlog of inherited
      # CVEs (mostly transitive deps under tooling like vercel CLI and
      # @solana/web3.js). Triage of these findings is its own follow-up; this
      # workflow landing first is the prerequisite to track them at all.
      # TODO(post-triage): drop `|| true` so production high/critical hard-fails
      # the run. Tracked under Frente B / D of PLANO_PRE_LANCAMENTO.md.
      - name: Audit production dependencies (high+, informational for now)
        run: npm audit --omit=dev --audit-level=high || true

      # Informational sweep across the whole tree (devDeps included). Never
      # fails the job; output is preserved in workflow logs for triage.
      - name: Audit all dependencies (informational, never fails)
        if: always()
        run: npm audit || true

      # Hard gate that DOES fail: critical findings in production deps that
      # are NOT in the carried-over backlog. The carry-over set is captured
      # in `.github/audit-allowlist.json`; CVEs outside that list block the
      # PR. This gives us a real merge gate today without rewriting the
      # lockfile.
      # NOTE: allowlist file does not exist yet — the step is staged off
      # until triage produces it. When ready, flip `if: false` to `if: always()`.
      - name: Audit production dependencies (delta vs allowlist)
        if: false
        run: |
          echo "Allowlist-based gate not yet active. See PLANO_PRE_LANCAMENTO.md Frente B/D."
          exit 1
