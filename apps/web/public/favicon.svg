<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0a"/>

  <!-- Hood shape -->
  <path d="M16 4 C8 4 4 12 4 18 C4 20 5 22 8 24 L16 28 L24 24 C27 22 28 20 28 18 C28 12 24 4 16 4Z" fill="#1a0e09" stroke="#e11d48" stroke-width="0.5" opacity="0.8"/>

  <!-- Inner hood shadow -->
  <ellipse cx="16" cy="16" rx="8" ry="10" fill="#0a0a0a"/>

  <!-- Left eye glow -->
  <ellipse cx="12" cy="14" rx="2.5" ry="1.5" fill="#e11d48">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Right eye glow -->
  <ellipse cx="20" cy="14" rx="2.5" ry="1.5" fill="#e11d48">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Eye glow effect -->
  <ellipse cx="12" cy="14" rx="3.5" ry="2.5" fill="#e11d48" opacity="0.3"/>
  <ellipse cx="20" cy="14" rx="3.5" ry="2.5" fill="#e11d48" opacity="0.3"/>
</svg>
