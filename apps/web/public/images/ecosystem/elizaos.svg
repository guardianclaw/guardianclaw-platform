<svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>ElizaOS</title>
  <!-- ElizaOS official logo: Pixelated O with center square (robot eye) -->
  <!-- Outer pixelated circle -->
  <path d="M8 2h8v2h2v2h2v8h-2v2h-2v2H8v-2H6v-2H4V6h2V4h2V2z"/>
  <!-- Inner cutout (transparent) -->
  <path d="M8 6h8v2h2v8h-2v2H8v-2H6V8h2V6z" fill="none"/>
  <!-- Create the ring by subtracting inner from outer -->
  <rect x="8" y="4" width="8" height="2"/>
  <rect x="16" y="6" width="2" height="2"/>
  <rect x="18" y="8" width="2" height="8"/>
  <rect x="16" y="16" width="2" height="2"/>
  <rect x="8" y="18" width="8" height="2"/>
  <rect x="6" y="16" width="2" height="2"/>
  <rect x="4" y="8" width="2" height="8"/>
  <rect x="6" y="6" width="2" height="2"/>
  <!-- Center square -->
  <rect x="10" y="10" width="4" height="4"/>
</svg>
