<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <!-- Gradients for layer cards -->
    <linearGradient id="l1-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="l2-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e11d48;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="l3-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="l4-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.05"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="l1-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="l2-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#e11d48" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="l3-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="l4-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#14b8a6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e11d48"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#71717a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="16" font-weight="bold">ARQUITETURA DE VALIDAÇÃO EM 4 CAMADAS</text>

  <!-- Input Node -->
  <rect x="20" y="120" width="100" height="50" rx="25" fill="#1e1e2e" stroke="#71717a" stroke-width="1.5"/>
  <text x="70" y="150" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ENTRADA</text>

  <!-- Arrow: Input -> L1 -->
  <line x1="120" y1="145" x2="148" y2="145" stroke="#71717a" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <!-- L1: InputValidator -->
  <g filter="url(#l1-glow)">
    <rect x="160" y="90" width="120" height="110" rx="8" fill="url(#l1-gradient)" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="220" y="115" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">L1</text>
  <text x="220" y="135" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10" font-weight="bold">InputValidator</text>
  <line x1="175" y1="150" x2="265" y2="150" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="220" y="170" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Heurística</text>
  <text x="220" y="185" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Pré-IA</text>

  <!-- Arrow: L1 -> L2 -->
  <line x1="280" y1="145" x2="308" y2="145" stroke="#e11d48" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="294" y="135" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="8">PASSA</text>

  <!-- L2: Seed Injection -->
  <g filter="url(#l2-glow)">
    <rect x="320" y="90" width="120" height="110" rx="8" fill="url(#l2-gradient)" stroke="#e11d48" stroke-width="2"/>
  </g>
  <text x="380" y="115" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="12" font-weight="bold">L2</text>
  <text x="380" y="135" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Seed Injection</text>
  <line x1="335" y1="150" x2="425" y2="150" stroke="#e11d48" stroke-opacity="0.3" stroke-width="1"/>
  <text x="380" y="170" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">CLAW no</text>
  <text x="380" y="185" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">System Prompt</text>

  <!-- Arrow: L2 -> L3 -->
  <line x1="440" y1="145" x2="468" y2="145" stroke="#71717a" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <text x="454" y="135" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="8">IA</text>

  <!-- L3: OutputValidator -->
  <g filter="url(#l3-glow)">
    <rect x="480" y="90" width="120" height="110" rx="8" fill="url(#l3-gradient)" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="540" y="115" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">L3</text>
  <text x="540" y="135" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10" font-weight="bold">OutputValidator</text>
  <line x1="495" y1="150" x2="585" y2="150" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="540" y="170" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Heurística</text>
  <text x="540" y="185" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Pós-IA</text>

  <!-- Arrow: L3 -> L4 -->
  <line x1="600" y1="145" x2="628" y2="145" stroke="#e11d48" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="614" y="135" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="8">PASSA</text>

  <!-- L4: GuardianClawObserver -->
  <g filter="url(#l4-glow)">
    <rect x="640" y="90" width="120" height="110" rx="8" fill="url(#l4-gradient)" stroke="#14b8a6" stroke-width="2"/>
  </g>
  <text x="700" y="115" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">L4</text>
  <text x="700" y="135" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Observer</text>
  <line x1="655" y1="150" x2="745" y2="150" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="700" y="170" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Análise</text>
  <text x="700" y="185" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Semântica LLM</text>

  <!-- Output Node -->
  <rect x="680" y="240" width="100" height="50" rx="25" fill="rgba(34,197,94,0.1)" stroke="#e11d48" stroke-width="2"/>
  <text x="730" y="270" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="11" font-weight="bold">SEGURO</text>

  <!-- Arrow: L4 -> Output -->
  <line x1="700" y1="200" x2="700" y2="235" stroke="#e11d48" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Question labels below each layer -->
  <text x="220" y="230" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9" font-style="italic">"Isso é ATAQUE?"</text>
  <text x="380" y="230" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9" font-style="italic">"Alinhar IA"</text>
  <text x="540" y="230" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9" font-style="italic">"Seed FALHOU?"</text>
  <text x="700" y="230" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9" font-style="italic">"Análise profunda"</text>

  <!-- Vertical dotted lines from layers to questions -->
  <line x1="220" y1="200" x2="220" y2="218" stroke="#71717a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="380" y1="200" x2="380" y2="218" stroke="#71717a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="540" y1="200" x2="540" y2="218" stroke="#71717a" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Legend -->
  <g transform="translate(20, 270)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6"/>
    <text x="18" y="10" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Pré-IA</text>

    <rect x="70" y="0" width="12" height="12" rx="2" fill="#e11d48"/>
    <text x="88" y="10" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Durante IA</text>

    <rect x="160" y="0" width="12" height="12" rx="2" fill="#f59e0b"/>
    <text x="178" y="10" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Pós-IA Heurístico</text>

    <rect x="280" y="0" width="12" height="12" rx="2" fill="#14b8a6"/>
    <text x="298" y="10" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">Pós-IA Semântico</text>
  </g>
</svg>