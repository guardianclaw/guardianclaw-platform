<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <!-- Gradients for each framework -->
    <linearGradient id="eu-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="owasp-llm-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="owasp-agentic-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="csa-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.05"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="blue-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amber-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pink-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="teal-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#14b8a6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#0a0a0a"/>

  <!-- Main container -->
  <rect x="20" y="20" width="660" height="360" rx="12" fill="#141414" stroke="#262626" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="55" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="18" font-weight="bold">UNIVERSAL COMPLIANCE CHECKER</text>
  <text x="350" y="75" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="11">Validação agnóstica contra frameworks de segurança e regulamentação</text>

  <!-- ===== EU AI Act (Top Left) ===== -->
  <g filter="url(#blue-glow)">
    <rect x="40" y="95" width="295" height="120" rx="8" fill="url(#eu-gradient)" stroke="#3b82f6" stroke-width="2"/>
  </g>

  <!-- EU Flag icon simplified -->
  <circle cx="80" cy="135" r="18" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="140" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="16">EU</text>

  <text x="195" y="125" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">EU AI Act</text>
  <text x="195" y="145" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="11">Regulamento 2024/1689</text>

  <line x1="55" y1="160" x2="320" y2="160" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>

  <text x="187" y="180" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">Artigo 5 - Práticas Proibidas</text>
  <text x="187" y="198" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Manipulação subliminar, exploração de vulnerabilidades,</text>
  <text x="187" y="210" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">scoring social, biometria em tempo real</text>

  <!-- ===== OWASP LLM Top 10 (Top Right) ===== -->
  <g filter="url(#amber-glow)">
    <rect x="365" y="95" width="295" height="120" rx="8" fill="url(#owasp-llm-gradient)" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- OWASP icon simplified -->
  <circle cx="405" cy="135" r="18" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="405" y="132" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="9" font-weight="bold">OWASP</text>
  <text x="405" y="143" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="8">LLM</text>

  <text x="520" y="125" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">OWASP LLM Top 10</text>
  <text x="520" y="145" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="11">2025 Edition</text>

  <line x1="380" y1="160" x2="645" y2="160" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>

  <text x="512" y="180" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">10 Vulnerabilidades Críticas</text>
  <text x="512" y="198" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Prompt Injection, Data Leakage, Model DoS,</text>
  <text x="512" y="210" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Insecure Output, Training Data Poisoning</text>

  <!-- ===== OWASP Agentic Top 10 (Bottom Left) ===== -->
  <g filter="url(#pink-glow)">
    <rect x="40" y="235" width="295" height="120" rx="8" fill="url(#owasp-agentic-gradient)" stroke="#ec4899" stroke-width="2"/>
  </g>

  <!-- OWASP Agentic icon -->
  <circle cx="80" cy="275" r="18" fill="rgba(236,72,153,0.2)" stroke="#ec4899" stroke-width="1.5"/>
  <text x="80" y="272" text-anchor="middle" fill="#ec4899" font-family="Arial, sans-serif" font-size="9" font-weight="bold">OWASP</text>
  <text x="80" y="283" text-anchor="middle" fill="#ec4899" font-family="Arial, sans-serif" font-size="8">AGENT</text>

  <text x="195" y="265" text-anchor="middle" fill="#ec4899" font-family="Arial, sans-serif" font-size="14" font-weight="bold">OWASP Agentic Top 10</text>
  <text x="195" y="285" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="11">2026 Edition</text>

  <line x1="55" y1="300" x2="320" y2="300" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1"/>

  <text x="187" y="320" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">10 Ameaças Específicas de Agentes</text>
  <text x="187" y="338" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Goal Hijack, Tool Misuse, Memory Poisoning,</text>
  <text x="187" y="350" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Rogue Agents, Cascading Failures</text>

  <!-- ===== CSA AI Controls Matrix (Bottom Right) ===== -->
  <g filter="url(#teal-glow)">
    <rect x="365" y="235" width="295" height="120" rx="8" fill="url(#csa-gradient)" stroke="#14b8a6" stroke-width="2"/>
  </g>

  <!-- CSA icon -->
  <circle cx="405" cy="275" r="18" fill="rgba(20,184,166,0.2)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="405" y="280" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">CSA</text>

  <text x="520" y="265" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">CSA AI Controls Matrix</text>
  <text x="520" y="285" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="11">AICM v1.0</text>

  <line x1="380" y1="300" x2="645" y2="300" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>

  <text x="512" y="320" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">6 Domínios de Segurança Enterprise</text>
  <text x="512" y="338" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Model Security, Data Protection, Infrastructure,</text>
  <text x="512" y="350" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Governance, Privacy, Operational Security</text>

  <!-- Central connecting element (centered between 4 boxes) -->
  <circle cx="350" cy="225" r="25" fill="#e11d48" fill-opacity="0.1" stroke="#e11d48" stroke-width="2"/>
  <text x="350" y="222" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="10" font-weight="bold">CLAW</text>
  <text x="350" y="234" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="8">Protocol</text>

  <!-- Connection lines to center -->
  <line x1="335" y1="215" x2="310" y2="195" stroke="#e11d48" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="365" y1="215" x2="390" y2="195" stroke="#e11d48" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="335" y1="235" x2="310" y2="255" stroke="#e11d48" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="365" y1="235" x2="390" y2="255" stroke="#e11d48" stroke-width="1" stroke-opacity="0.5"/>
</svg>