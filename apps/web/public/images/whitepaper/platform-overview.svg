<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <!-- Gradients for each section -->
    <linearGradient id="builder-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="flow-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="deploy-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e11d48;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="monitor-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.05"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="blue-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amber-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="green-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#e11d48" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="teal-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#14b8a6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L12,4 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L12,4 z" fill="#e11d48"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L12,4 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#0a0a0a"/>

  <!-- Main container -->
  <rect x="20" y="20" width="860" height="360" rx="12" fill="#141414" stroke="#262626" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="55" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="20" font-weight="bold">GCLAW PLATFORM</text>
  <text x="450" y="75" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="11">Construa, teste, implante e monitore agentes de IA seguros</text>

  <!-- ===== Agent Builder Section ===== -->
  <g filter="url(#blue-glow)">
    <rect x="35" y="100" width="185" height="240" rx="10" fill="url(#builder-gradient)" stroke="#3b82f6" stroke-width="2"/>
  </g>

  <!-- Builder Icon -->
  <circle cx="127" cy="132" r="18" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="118" y="123" width="18" height="18" rx="3" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <line x1="122" y1="132" x2="132" y2="132" stroke="#3b82f6" stroke-width="2"/>
  <line x1="127" y1="127" x2="127" y2="137" stroke="#3b82f6" stroke-width="2"/>

  <text x="127" y="168" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Agent Builder</text>

  <!-- Builder features -->
  <g transform="translate(45, 185)">
    <rect x="0" y="0" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="17" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">18 Templates</text>

    <rect x="0" y="32" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="49" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Seleção de Framework</text>

    <rect x="0" y="64" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="81" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Configuração L1-L4</text>

    <rect x="0" y="96" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="113" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Integração de Tools</text>
  </g>

  <!-- Arrow: Builder -> Flow -->
  <line x1="220" y1="220" x2="248" y2="220" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow-amber)"/>

  <!-- ===== Flow Builder Section ===== -->
  <g filter="url(#amber-glow)">
    <rect x="250" y="100" width="185" height="240" rx="10" fill="url(#flow-gradient)" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- Flow Icon -->
  <circle cx="342" cy="132" r="18" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.5"/>
  <path d="M333,128 L337,128 L337,124 L345,132 L337,140 L337,136 L333,136 Z" fill="#f59e0b"/>
  <circle cx="349" cy="126" r="3" fill="#f59e0b"/>
  <circle cx="349" cy="138" r="3" fill="#f59e0b"/>

  <text x="342" y="168" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Flow Builder</text>

  <!-- Flow features -->
  <g transform="translate(260, 185)">
    <rect x="0" y="0" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="17" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Editor Drag-and-Drop</text>

    <rect x="0" y="32" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="49" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Nodes L1-L4 Visuais</text>

    <rect x="0" y="64" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="81" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Preview Real-Time</text>

    <rect x="0" y="96" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="113" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Exportação de Código</text>
  </g>

  <!-- Arrow: Flow -> Deploy -->
  <line x1="435" y1="220" x2="463" y2="220" stroke="#e11d48" stroke-width="3" marker-end="url(#arrow-green)"/>

  <!-- ===== Deploy Section ===== -->
  <g filter="url(#green-glow)">
    <rect x="465" y="100" width="185" height="240" rx="10" fill="url(#deploy-gradient)" stroke="#e11d48" stroke-width="2"/>
  </g>

  <!-- Deploy Icon -->
  <circle cx="557" cy="132" r="18" fill="rgba(34,197,94,0.2)" stroke="#e11d48" stroke-width="1.5"/>
  <path d="M548,137 L557,123 L566,137 Z" fill="#e11d48"/>
  <rect x="553" y="137" width="8" height="9" fill="#e11d48"/>

  <text x="557" y="168" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Deploy</text>

  <!-- Deploy features -->
  <g transform="translate(475, 185)">
    <rect x="0" y="0" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#e11d48" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="17" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">One-Click Deploy</text>

    <rect x="0" y="32" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#e11d48" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="49" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Auto-Scaling</text>

    <rect x="0" y="64" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#e11d48" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="81" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">API Key Management</text>

    <rect x="0" y="96" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#e11d48" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="113" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Versionamento</text>
  </g>

  <!-- Arrow: Deploy -> Monitor -->
  <line x1="650" y1="220" x2="678" y2="220" stroke="#14b8a6" stroke-width="3" marker-end="url(#arrow-teal)"/>

  <!-- ===== Monitor Section ===== -->
  <g filter="url(#teal-glow)">
    <rect x="680" y="100" width="185" height="240" rx="10" fill="url(#monitor-gradient)" stroke="#14b8a6" stroke-width="2"/>
  </g>

  <!-- Monitor Icon -->
  <circle cx="772" cy="132" r="18" fill="rgba(20,184,166,0.2)" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="762" y="124" width="20" height="14" rx="2" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <line x1="767" y1="131" x2="770" y2="128" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="770" y1="128" x2="774" y2="133" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="774" y1="133" x2="777" y2="127" stroke="#14b8a6" stroke-width="1.5"/>

  <text x="772" y="168" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Monitor</text>

  <!-- Monitor features -->
  <g transform="translate(690, 185)">
    <rect x="0" y="0" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="17" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Logs Real-Time</text>

    <rect x="0" y="32" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="49" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Dashboard Analytics</text>

    <rect x="0" y="64" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="81" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Alertas de Segurança</text>

    <rect x="0" y="96" width="165" height="26" rx="4" fill="#1e1e2e" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="82" y="113" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="9">Métricas por Gate</text>
  </g>

  <!-- Bottom bar: Execution model -->
  <rect x="35" y="350" width="830" height="25" rx="4" fill="#1e1e2e" stroke="#262626" stroke-width="1"/>
  <text x="450" y="367" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="10">Modelo de Execução: Pay-per-use  |  Benefícios para Holders $GCLAW  |  Métricas de Segurança Detalhadas</text>
</svg>
