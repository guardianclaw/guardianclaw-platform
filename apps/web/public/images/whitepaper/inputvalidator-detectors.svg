<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <defs>
    <!-- Gradient for main box -->
    <linearGradient id="main-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.03"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="box-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#71717a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#e11d48"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="500" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">INPUTVALIDATOR v1.8.0 - ARQUITETURA DE DETECTORES</text>

  <!-- Main InputValidator Box -->
  <g filter="url(#box-glow)">
    <rect x="250" y="50" width="200" height="45" rx="6" fill="url(#main-gradient)" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="350" y="78" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="13" font-weight="bold">InputValidator</text>

  <!-- Vertical line from InputValidator -->
  <line x1="350" y1="95" x2="350" y2="120" stroke="#3b82f6" stroke-width="2"/>

  <!-- Three-way split -->
  <line x1="100" y1="120" x2="600" y2="120" stroke="#3b82f6" stroke-width="2"/>

  <!-- Vertical lines to three main components -->
  <line x1="100" y1="120" x2="100" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="350" y1="120" x2="350" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="600" y1="120" x2="600" y2="145" stroke="#3b82f6" stroke-width="2"/>

  <!-- TextNormalizer -->
  <rect x="30" y="145" width="140" height="55" rx="6" fill="#141414" stroke="#71717a" stroke-width="1.5"/>
  <text x="100" y="168" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">TextNormalizer</text>
  <text x="100" y="185" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">8 estágios</text>
  <text x="100" y="195" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="8">desobfuscação</text>

  <!-- Detectors Box -->
  <rect x="200" y="145" width="300" height="260" rx="6" fill="#141414" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="165" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">DETECTORES</text>

  <!-- Detector list with weights -->
  <g transform="translate(215, 180)">
    <!-- PatternDetector -->
    <rect x="0" y="0" width="270" height="24" rx="4" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="16" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">PatternDetector</text>
    <text x="200" y="16" fill="#3b82f6" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.0</text>
    <text x="138" y="16" fill="#71717a" font-family="Arial, sans-serif" font-size="8">700+ padrões</text>

    <!-- EscalationDetector -->
    <rect x="0" y="28" width="270" height="24" rx="4" fill="rgba(59,130,246,0.12)" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="44" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">EscalationDetector</text>
    <text x="200" y="44" fill="#3b82f6" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.1</text>
    <text x="138" y="44" fill="#71717a" font-family="Arial, sans-serif" font-size="8">Crescendo, MHJ</text>

    <!-- FramingDetector -->
    <rect x="0" y="56" width="270" height="24" rx="4" fill="rgba(59,130,246,0.14)" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="72" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">FramingDetector</text>
    <text x="200" y="72" fill="#3b82f6" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.2</text>
    <text x="138" y="72" fill="#71717a" font-family="Arial, sans-serif" font-size="8">roleplay, DAN</text>

    <!-- HarmfulRequestDetector -->
    <rect x="0" y="84" width="270" height="24" rx="4" fill="rgba(59,130,246,0.16)" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="100" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">HarmfulRequestDetector</text>
    <text x="200" y="100" fill="#3b82f6" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.3</text>
    <text x="155" y="100" fill="#71717a" font-family="Arial, sans-serif" font-size="8">10 categorias</text>

    <!-- IntentSignalDetector -->
    <rect x="0" y="112" width="270" height="24" rx="4" fill="rgba(59,130,246,0.16)" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="128" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">IntentSignalDetector</text>
    <text x="200" y="128" fill="#3b82f6" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.3</text>
    <text x="150" y="128" fill="#71717a" font-family="Arial, sans-serif" font-size="8">composicional</text>

    <!-- PhysicalSafetyDetector -->
    <rect x="0" y="140" width="270" height="24" rx="4" fill="rgba(59,130,246,0.18)" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="156" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">PhysicalSafetyDetector</text>
    <text x="200" y="156" fill="#3b82f6" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.4</text>
    <text x="160" y="156" fill="#71717a" font-family="Arial, sans-serif" font-size="8">robótica</text>

    <!-- SafeAgentDetector -->
    <rect x="0" y="168" width="270" height="24" rx="4" fill="rgba(59,130,246,0.18)" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="184" fill="#fafafa" font-family="Arial, sans-serif" font-size="10">SafeAgentDetector</text>
    <text x="200" y="184" fill="#3b82f6" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.4</text>
    <text x="138" y="184" fill="#71717a" font-family="Arial, sans-serif" font-size="8">SafeAgentBench</text>

    <!-- EmbeddingDetector -->
    <rect x="0" y="196" width="270" height="24" rx="4" fill="rgba(59,130,246,0.18)" stroke="#71717a" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="10" y="212" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="10">EmbeddingDetector</text>
    <text x="200" y="212" fill="#71717a" font-family="Arial, sans-serif" font-size="9" font-weight="bold">peso: 1.4</text>
    <text x="145" y="212" fill="#71717a" font-family="Arial, sans-serif" font-size="8">(opcional)</text>
  </g>

  <!-- Aggregator -->
  <rect x="530" y="145" width="140" height="55" rx="6" fill="#141414" stroke="#71717a" stroke-width="1.5"/>
  <text x="600" y="168" text-anchor="middle" fill="#fafafa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Aggregator</text>
  <text x="600" y="185" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">soma ponderada</text>
  <text x="600" y="195" text-anchor="middle" fill="#71717a" font-family="Arial, sans-serif" font-size="8">threshold: 0.5</text>

  <!-- Lines from three components down -->
  <line x1="100" y1="200" x2="100" y2="430" stroke="#71717a" stroke-width="1.5"/>
  <line x1="350" y1="405" x2="350" y2="430" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="600" y1="200" x2="600" y2="430" stroke="#71717a" stroke-width="1.5"/>

  <!-- Horizontal line joining all three -->
  <line x1="100" y1="430" x2="600" y2="430" stroke="#71717a" stroke-width="1.5"/>

  <!-- Down to BenignContextDetector -->
  <line x1="350" y1="430" x2="350" y2="445" stroke="#e11d48" stroke-width="2"/>

  <!-- BenignContextDetector -->
  <rect x="250" y="445" width="200" height="40" rx="6" fill="rgba(34,197,94,0.1)" stroke="#e11d48" stroke-width="1.5"/>
  <text x="350" y="463" text-anchor="middle" fill="#e11d48" font-family="Arial, sans-serif" font-size="11" font-weight="bold">BenignContextDetector</text>
  <text x="350" y="478" text-anchor="middle" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="9">redução de falsos positivos</text>

  <!-- Legend -->
  <g transform="translate(30, 450)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1"/>
    <text x="15" y="9" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="8">Peso maior = mais peso na decisão final</text>
  </g>

  <!-- Weight scale indicator -->
  <g transform="translate(530, 250)">
    <text x="0" y="0" fill="#71717a" font-family="Arial, sans-serif" font-size="9">Escala de Pesos:</text>
    <rect x="0" y="8" width="20" height="8" fill="rgba(59,130,246,0.1)"/>
    <text x="25" y="15" fill="#71717a" font-family="Arial, sans-serif" font-size="8">1.0</text>
    <rect x="50" y="8" width="20" height="8" fill="rgba(59,130,246,0.18)"/>
    <text x="75" y="15" fill="#71717a" font-family="Arial, sans-serif" font-size="8">1.4</text>
  </g>
</svg>